name: Freeze Jukebox

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  freeze:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Standard GitHub-hosted runners available to all public repositories,
        # and arch strictly reflects the actual CPU architecture:
        # - Linux:  ubuntu-latest  (x64)
        # - Windows: windows-latest (x64)
        # - macOS:  macos-latest  (arm64, Apple Silicon)
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.14']
        include:
          - os: ubuntu-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix['python-version'] }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-dev

      - name: Install dependencies (common)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Windows-only dependencies
        if: runner.os == 'Windows'
        run: |
          pip install -r requirements-windows.txt

      - name: Install PyInstaller
        run: |
          pip install "pyinstaller>=6.0,<7"

      - name: Freeze to exe with PyInstaller
        env:
          BUILD_VERSION: ${{ github.ref_name }}
        run: |
          pyinstaller --clean Jukebox.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          # Jukebox-${os}-${arch}-${tag}
          name: Jukebox-${{ runner.os }}-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/**

  release:
    needs: freeze
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frozen artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect and rename executables per platform
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd artifacts
          for dir in Jukebox-*; do
            # Expect artifact directory name: Jukebox-${os}-${arch}-${tag}
            base="${dir#Jukebox-}"      # ${os}-${arch}-${tag}

            os="${base%%-*}"            # first field -> os
            rest="${base#${os}-}"       # drop "${os}-" -> ${arch}-${tag}
            arch="${rest%%-*}"          # second field -> arch

            if [ -z "$os" ] || [ -z "$arch" ]; then
              echo "Could not parse os/arch from artifact dir '$dir', skip."
              continue
            fi

            # Find main executable in this artifact (assumed to start with Jukebox)
            exe_path="$(find "$dir" -maxdepth 5 -type f -name 'Jukebox*' | head -n 1)"
            if [ -z "$exe_path" ]; then
              echo "No Jukebox binary found in $dir, skip."
              continue
            fi

            ext=""
            case "$exe_path" in
              *.exe) ext=".exe" ;;
            esac

            # Final release asset filename:
            #   Jukebox-${TAG_NAME}-${os}-${arch}[.exe]
            target="Jukebox-${TAG_NAME}-${os}-${arch}${ext}"
            echo "Copy $exe_path -> $target"
            cp "$exe_path" "$target"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES'
          ## Jukebox $TAG_NAME

          - **Commit**: ${{ github.sha }}
          - **Workflow run**: ${{ github.run_id }}

          ### Frozen executables

          These frozen executables are automatically produced by the CI workflow for each tagged release.
          The recommended way to run Jukebox is to use Python and run it from source at the latest commit on the default branch.
          When filing issues, please test and confirm the problem using the latest source version (run with Python) rather than a previously frozen release.
          NOTES

          sed -i "s@\$TAG_NAME@$TAG_NAME@g" /tmp/release-notes.md

          mapfile -d '' assets < <(find artifacts -maxdepth 1 -type f -name 'Jukebox-*' -print0)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "Error: no release assets found"
            exit 1
          fi

          if gh release view "$TAG_NAME" &>/dev/null; then
            gh release edit "$TAG_NAME" --notes-file /tmp/release-notes.md
            gh release upload "$TAG_NAME" --clobber "${assets[@]}"
          else
            gh release create "$TAG_NAME" \
              "${assets[@]}" \
              --title "Jukebox $TAG_NAME" \
              --notes-file /tmp/release-notes.md
          fi


