name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-windows.txt
            requirements-test.txt

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-dev libegl1

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-test.txt

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt -r requirements-test.txt

      - name: Run tests with coverage
        run: >
          python -m pytest
          --cov=core
          --cov=analysis
          --cov=playback
          --cov=output
          --cov=config_repository
          --cov=config_bindings
          --cov=main_window
          --cov=models
          --cov-report=term-missing
          --cov-report=xml

      - name: Run static type checks
        if: runner.os == 'Linux'
        run: |
          python -m pyright tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ runner.os }}
          path: coverage.xml
